# ManifestWork that deploys keygen resources to the management cluster.
# If a signing key is provided, creates only the K8s Secret (caller handles OIDC).
# Otherwise generates an RSA keypair on the MC, creates the Secret, and publishes
# the JWKS + OIDC discovery documents to the GCS issuer bucket.
apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: "{{ .clusterId }}-signing-key-adapter"
  labels:
    hyperfleet.io/cluster-id: "{{ .clusterId }}"
    hyperfleet.io/adapter: "signing-key-adapter"
    hyperfleet.io/component: "signing-key"
  annotations:
    hyperfleet.io/generation: "{{ .generation }}"
spec:
  workload:
    manifests:

      # --- Manifest 0: Namespace ---
      - apiVersion: v1
        kind: Namespace
        metadata:
          name: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/cluster-name: "{{ .clusterName }}"
            hyperfleet.io/managed-by: "signing-key-adapter"
            hyperfleet.io/resource-type: "namespace"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"

      # --- Manifest 1: ServiceAccount for keygen Job ---
      # WIF annotation maps this K8s SA to a GCP SA with GCS write access
      - apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: keygen-sa
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "signing-key-adapter"
            hyperfleet.io/resource-type: "service-account"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
            iam.gke.io/gcp-service-account: "{{ .keygenGcpSA }}"

      # --- Manifest 2: Role (create/get secrets in namespace) ---
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: keygen-role
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "signing-key-adapter"
            hyperfleet.io/resource-type: "role"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        rules:
          - apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "create"]

      # --- Manifest 3: RoleBinding ---
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: keygen-rolebinding
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "signing-key-adapter"
            hyperfleet.io/resource-type: "role-binding"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        subjects:
          - kind: ServiceAccount
            name: keygen-sa
            namespace: "clusters-{{ .clusterId }}"
        roleRef:
          kind: Role
          name: keygen-role
          apiGroup: rbac.authorization.k8s.io

      # --- Manifest 4: Keygen Job ---
      # If SIGNING_KEY_PEM is provided, uses the caller-supplied key and creates
      # the K8s Secret only (caller handles OIDC/JWKS setup externally).
      # Otherwise generates RSA 4096-bit keypair, creates the Secret, and
      # publishes JWKS + OIDC discovery documents to the GCS issuer bucket.
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: "keygen-{{ .clusterId }}"
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "signing-key-adapter"
            hyperfleet.io/resource-type: "keygen-job"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        spec:
          backoffLimit: 3
          ttlSecondsAfterFinished: 3600
          template:
            metadata:
              labels:
                hyperfleet.io/cluster-id: "{{ .clusterId }}"
                hyperfleet.io/component: "keygen"
            spec:
              serviceAccountName: keygen-sa
              restartPolicy: OnFailure
              containers:
                - name: keygen
                  image: "{{ .keygenImage }}"
                  env:
                    - name: CLUSTER_ID
                      value: "{{ .clusterId }}"
                    - name: CLUSTER_NAME
                      value: "{{ .clusterName }}"
                    - name: INFRA_ID
                      value: "{{ .infraID }}"
                    - name: NAMESPACE
                      value: "clusters-{{ .clusterId }}"
                    - name: SECRET_NAME
                      value: "{{ .clusterName }}-signing-key"
                    - name: ISSUER_URL
                      value: "{{ .issuerURL }}"
                    - name: OIDC_BUCKET
                      value: "{{ .oidcBucket }}"
                    - name: SIGNING_KEY_PEM
                      value: "{{ .signingKeyPEM }}"
                    - name: KEYGEN_GCP_SA
                      value: "{{ .keygenGcpSA }}"
                  command: ["/bin/bash", "-c"]
                  args:
                    - |
                      set -euo pipefail

                      echo "=== Signing Key Generator ==="
                      echo "Cluster: ${CLUSTER_NAME} (${CLUSTER_ID})"
                      echo "InfraID: ${INFRA_ID}"
                      echo "Namespace: ${NAMESPACE}"
                      echo "Secret: ${SECRET_NAME}"
                      echo "Issuer URL: ${ISSUER_URL}"
                      echo "OIDC Bucket: ${OIDC_BUCKET}"
                      echo "Mode: $([ -n "${SIGNING_KEY_PEM}" ] && echo provided || echo generate)"

                      TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                      CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      API=https://kubernetes.default.svc

                      # Step 1: Obtain the private key
                      SECRET_EXISTED=false
                      HTTP_CODE=$(curl -s -o /tmp/existing-secret.json -w "%{http_code}" \
                        --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                        "${API}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}")

                      if [ "$HTTP_CODE" = "200" ]; then
                        echo "Secret ${SECRET_NAME} already exists — extracting key for OIDC upload"
                        SECRET_EXISTED=true
                        python3 -c "import json,base64,sys; d=json.load(open('/tmp/existing-secret.json')); sys.stdout.buffer.write(base64.b64decode(d['data']['key']))" > /tmp/sa-signer.key
                      elif [ -n "${SIGNING_KEY_PEM}" ]; then
                        echo "Using caller-provided signing key..."
                        echo "${SIGNING_KEY_PEM}" | base64 -d > /tmp/sa-signer.key

                        if ! head -1 /tmp/sa-signer.key | grep -q "BEGIN RSA PRIVATE KEY"; then
                          echo "ERROR: Provided key is not in PKCS#1 format (expected BEGIN RSA PRIVATE KEY)"
                          echo "Got: $(head -1 /tmp/sa-signer.key)"
                          exit 1
                        fi
                        if ! openssl rsa -in /tmp/sa-signer.key -check -noout 2>/dev/null; then
                          echo "ERROR: Provided key failed RSA validation"
                          exit 1
                        fi
                        echo "Provided key validated successfully"
                      else
                        echo "Generating 4096-bit RSA signing keypair (PKCS#1 format)..."
                        openssl genrsa 4096 2>/dev/null | openssl rsa -traditional -out /tmp/sa-signer.key 2>/dev/null
                      fi

                      # Step 2: Create K8s Secret (skip if already exists)
                      if [ "$SECRET_EXISTED" = "false" ]; then
                        KEY_B64=$(base64 -w 0 /tmp/sa-signer.key)
                        HTTP_CODE=$(curl -s -o /tmp/create-result.json -w "%{http_code}" \
                          --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/json" -X POST \
                          "${API}/api/v1/namespaces/${NAMESPACE}/secrets" \
                          -d "{
                            \"apiVersion\": \"v1\",
                            \"kind\": \"Secret\",
                            \"metadata\": {
                              \"name\": \"${SECRET_NAME}\",
                              \"namespace\": \"${NAMESPACE}\",
                              \"labels\": {
                                \"hyperfleet.io/cluster-id\": \"${CLUSTER_ID}\",
                                \"hyperfleet.io/managed-by\": \"signing-key-adapter\",
                                \"hyperfleet.io/resource-type\": \"signing-key\"
                              },
                              \"annotations\": {
                                \"referenced-resource.hypershift.openshift.io/${CLUSTER_NAME}\": \"true\"
                              }
                            },
                            \"type\": \"Opaque\",
                            \"data\": { \"key\": \"${KEY_B64}\" }
                          }")

                        if [ "$HTTP_CODE" != "201" ]; then
                          echo "ERROR: Failed to create secret (HTTP ${HTTP_CODE})"
                          cat /tmp/create-result.json
                          exit 1
                        fi
                        echo "Secret ${SECRET_NAME} created successfully"
                      fi

                      # Step 3: JWKS/OIDC setup (only needed when key is generated, not when provided)
                      # When a signing key is provided externally, the caller is responsible for
                      # OIDC bucket creation and JWKS upload (e.g. via setup-infra.sh).
                      if [ -z "${SIGNING_KEY_PEM}" ]; then
                        openssl rsa -in /tmp/sa-signer.key -pubout -out /tmp/sa-signer.pub

                        echo "Generating JWKS and OIDC discovery documents..."
                        python3 -c "
                      import json, base64, hashlib, subprocess, os

                      text_result = subprocess.run(
                          ['openssl', 'rsa', '-pubin', '-in', '/tmp/sa-signer.pub', '-text', '-noout'],
                          capture_output=True, text=True, check=True)
                      lines = text_result.stdout.splitlines()

                      mod_lines, in_mod = [], False
                      for line in lines:
                          if 'Modulus:' in line:
                              in_mod = True; continue
                          if 'Exponent:' in line:
                              exp_str = line.split('(')[1].rstrip(')') if '(' in line else ''
                              in_mod = False; continue
                          if in_mod:
                              mod_lines.append(line.strip().replace(':', ''))
                      mod_bytes = bytes.fromhex(''.join(mod_lines))
                      if mod_bytes[0:1] == b'\x00':
                          mod_bytes = mod_bytes[1:]

                      exp_int = int(exp_str, 16)
                      exp_len = (exp_int.bit_length() + 7) // 8
                      exp_bytes = exp_int.to_bytes(exp_len, 'big')

                      der_result = subprocess.run(
                          ['openssl', 'rsa', '-pubin', '-in', '/tmp/sa-signer.pub', '-outform', 'DER'],
                          capture_output=True, check=True)
                      kid = base64.urlsafe_b64encode(hashlib.sha256(der_result.stdout).digest()).rstrip(b'=').decode()

                      def b64url(b):
                          return base64.urlsafe_b64encode(b).rstrip(b'=').decode()

                      jwks = {'keys': [{
                          'kty': 'RSA', 'use': 'sig', 'alg': 'RS256', 'kid': kid,
                          'n': b64url(mod_bytes), 'e': b64url(exp_bytes),
                      }]}

                      issuer = os.environ['ISSUER_URL']
                      oidc = {
                          'issuer': issuer,
                          'jwks_uri': issuer + '/openid/v1/jwks',
                          'authorization_endpoint': 'urn:kubernetes:programmatic_authorization',
                          'response_types_supported': ['id_token'],
                          'subject_types_supported': ['public'],
                          'id_token_signing_alg_values_supported': ['RS256'],
                          'claims_supported': ['sub', 'iss'],
                      }

                      with open('/tmp/jwks.json', 'w') as f:
                          json.dump(jwks, f, indent=2)
                      with open('/tmp/openid-configuration', 'w') as f:
                          json.dump(oidc, f, indent=2)
                      print('JWKS and OIDC discovery documents generated (kid: ' + kid[:12] + '...)')
                        "

                        OIDC_PREFIX="${INFRA_ID}"
                        echo "Uploading OIDC documents to gs://${OIDC_BUCKET}/${OIDC_PREFIX}/"

                        obtain_access_token() {
                          # Try the GKE metadata server directly via curl (bypasses gcloud).
                          # Works when WIF is enabled even if metadata concealment is on.
                          echo "Requesting token from GKE metadata server..."
                          local meta_resp meta_http
                          meta_resp=$(curl -s -o /tmp/meta-token.json -w "%{http_code}" \
                            -H "Metadata-Flavor: Google" \
                            "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
                            --connect-timeout 3 --max-time 5)
                          if [ "${meta_resp}" = "200" ]; then
                            WIF_ACCESS_TOKEN=$(sed -n 's/.*"access_token" *: *"\([^"]*\)".*/\1/p' /tmp/meta-token.json | head -1)
                            if [ -n "${WIF_ACCESS_TOKEN}" ]; then
                              echo "Got access token from GKE metadata server"
                              rm -f /tmp/meta-token.json
                              return 0
                            fi
                          fi
                          echo "GKE metadata server unavailable (HTTP ${meta_resp})"
                          cat /tmp/meta-token.json 2>/dev/null || true
                          rm -f /tmp/meta-token.json

                          # Fallback: impersonate the GSA via IAM Credentials API using
                          # the projected K8s SA token directly. This works when the GSA
                          # has workloadIdentityUser binding for this KSA.
                          local gcp_sa="${KEYGEN_GCP_SA}"
                          if [ -z "${gcp_sa}" ]; then
                            echo "WARN: KEYGEN_GCP_SA not set, cannot impersonate"
                            return 1
                          fi
                          echo "Trying direct GSA impersonation with K8s SA token..."
                          local sa_token imp_response
                          sa_token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                          imp_response=$(curl -s -X POST \
                            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${gcp_sa}:generateAccessToken" \
                            -H "Authorization: Bearer ${sa_token}" \
                            -H "Content-Type: application/json" \
                            -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}')
                          WIF_ACCESS_TOKEN=$(echo "$imp_response" | sed -n 's/.*"accessToken" *: *"\([^"]*\)".*/\1/p' | head -1) || true
                          if [ -n "$WIF_ACCESS_TOKEN" ]; then
                            echo "GCP access token obtained via direct impersonation"
                            return 0
                          fi
                          echo "WARN: Direct impersonation failed"
                          echo "$imp_response"
                          return 1
                        }

                        upload_to_gcs() {
                          local src_file="$1" dst_object="$2" access_token="$3"
                          local encoded_object
                          encoded_object=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${dst_object}")
                          local http_code
                          http_code=$(curl -s -o /tmp/gcs-upload-result.json -w "%{http_code}" \
                            -X POST \
                            "https://storage.googleapis.com/upload/storage/v1/b/${OIDC_BUCKET}/o?uploadType=media&name=${encoded_object}" \
                            -H "Authorization: Bearer ${access_token}" \
                            -H "Content-Type: application/json" \
                            --data-binary @"${src_file}")
                          if [ "${http_code}" != "200" ]; then
                            echo "ERROR: GCS upload failed for ${dst_object} (HTTP ${http_code})"
                            cat /tmp/gcs-upload-result.json
                            return 1
                          fi
                          echo "  Uploaded: gs://${OIDC_BUCKET}/${dst_object}"
                        }

                        UPLOAD_OK=false

                        # --- Attempt 1: get token then curl upload ---
                        if obtain_access_token; then
                          echo "Uploading via GCS JSON API..."
                          if upload_to_gcs /tmp/jwks.json "${OIDC_PREFIX}/openid/v1/jwks" "${WIF_ACCESS_TOKEN}" && \
                             upload_to_gcs /tmp/openid-configuration "${OIDC_PREFIX}/.well-known/openid-configuration" "${WIF_ACCESS_TOKEN}"; then
                            UPLOAD_OK=true
                          else
                            echo "WARN: curl upload failed"
                          fi
                        fi

                        # --- Attempt 2: Plain gcloud (for envs without concealment) ---
                        if [ "${UPLOAD_OK}" = "false" ]; then
                          echo "Fallback: plain gcloud storage cp..."
                          if gcloud storage cp /tmp/jwks.json "gs://${OIDC_BUCKET}/${OIDC_PREFIX}/openid/v1/jwks" \
                               --content-type="application/json" 2>&1 && \
                             gcloud storage cp /tmp/openid-configuration "gs://${OIDC_BUCKET}/${OIDC_PREFIX}/.well-known/openid-configuration" \
                               --content-type="application/json" 2>&1; then
                            UPLOAD_OK=true
                          fi
                        fi

                        if [ "${UPLOAD_OK}" = "false" ]; then
                          echo "ERROR: All upload methods failed"
                          exit 1
                        fi

                        echo "OIDC documents uploaded successfully to gs://${OIDC_BUCKET}/${OIDC_PREFIX}/"
                        rm -f /tmp/sa-signer.pub
                      else
                        echo "Skipping JWKS/OIDC setup — caller provided the signing key and is responsible for OIDC configuration"
                      fi

                      rm -f /tmp/sa-signer.key

                      echo "=== Signing Key Generation Complete ==="
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi

  deleteOption:
    propagationPolicy: "Foreground"

  manifestConfigs:
    - resourceIdentifier:
        group: ""
        resource: "namespaces"
        name: "clusters-{{ .clusterId }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "phase"
              path: ".status.phase"

    - resourceIdentifier:
        group: "batch"
        resource: "jobs"
        namespace: "clusters-{{ .clusterId }}"
        name: "keygen-{{ .clusterId }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "succeeded"
              path: ".status.succeeded"
            - name: "failed"
              path: ".status.failed"
            - name: "active"
              path: ".status.active"
