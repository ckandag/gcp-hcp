{{- if .Values.gcpResources.enabled }}
apiVersion: pubsub.cnrm.cloud.google.com/v1beta1
kind: PubSubSubscription
metadata:
  name: {{ .Values.gcpResources.pubsub.subscriptionName }}
  annotations:
    cnrm.cloud.google.com/project-id: {{ .Values.gcpResources.projectId | quote }}
    argocd.argoproj.io/sync-wave: "-1"
spec:
  topicRef:
    name: {{ .Values.gcpResources.pubsub.topic }}
  ackDeadlineSeconds: {{ .Values.gcpResources.pubsub.ackDeadlineSeconds | default 60 }}
  messageRetentionDuration: {{ .Values.gcpResources.pubsub.messageRetentionDuration | default "604800s" | quote }}
{{- end }}
