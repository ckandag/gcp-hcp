# Placement Job - selects an eligible management cluster and DNS zone.
#
# Cross-checks Secret Manager secrets against Maestro consumers for MC
# selection, then reads HC DNS domains from Secret Manager for DNS zone
# placement. Patches the Job's .status.conditions with three condition
# types: MCPlacement, DNSPlacement, and Available (aggregate).
apiVersion: batch/v1
kind: Job
metadata:
  name: "placement-{{ .clusterId }}"
  namespace: "{{ .namespace }}"
  labels:
    hyperfleet.io/cluster-id: "{{ .clusterId }}"
    hyperfleet.io/resource-type: "job"
    hyperfleet.io/managed-by: "placement-adapter"
  annotations:
    hyperfleet.io/generation: "{{ .generation }}"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: placement-job
        job-name: "placement-{{ .clusterId }}"
        hyperfleet.io/cluster-id: "{{ .clusterId }}"
    spec:
      serviceAccountName: "{{ .serviceAccountName }}"
      restartPolicy: OnFailure

      containers:
        - name: placement
          image: "{{ .placementImage }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "=== Placement Job ==="
              echo "Cluster:     ${CLUSTER_ID}"
              echo "GCP Project: ${GCP_PROJECT_ID}"
              echo "Maestro URL: ${MAESTRO_URL}"

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API=https://kubernetes.default.svc

              # Build a single JSON condition object.
              build_condition() {
                local cond_type="$1" cond_status="$2" reason="$3" message="$4"
                python3 -c "
              import json, datetime
              print(json.dumps({
                'type': '${cond_type}',
                'status': '${cond_status}',
                'reason': '${reason}',
                'message': '${message}',
                'lastTransitionTime': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
              }))
              "
              }

              # Patch the Job's .status.conditions with an array of conditions.
              patch_job_conditions() {
                local conditions_json="$1"
                local payload
                payload=$(python3 -c "
              import json
              conditions = json.loads('${conditions_json}')
              print(json.dumps({'status': {'conditions': conditions}}))
              ")
                curl -sf --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/merge-patch+json" \
                  -X PATCH \
                  "${API}/apis/batch/v1/namespaces/${NAMESPACE}/jobs/placement-${CLUSTER_ID}/status" \
                  -d "${payload}" > /dev/null
              }

              # Patch a failure: sets MCPlacement=False and Available=False.
              patch_failure() {
                local reason="$1" message="$2"
                local mc_cond avail_cond
                mc_cond=$(build_condition "MCPlacement" "False" "$reason" "$message")
                avail_cond=$(build_condition "Available" "False" "PlacementFailed" "$message")
                patch_job_conditions "[${mc_cond},${avail_cond}]"
              }

              # ── Step 1: Secret Manager ─────────────────────────────────
              # Query MC secrets and read both consumer name and optional capacity label.
              echo "Querying Secret Manager for MC secrets..."
              _sm_err=$(mktemp)
              SM_JSON=$(gcloud secrets list \
                --project="${GCP_PROJECT_ID}" \
                --filter='labels.maestro-consumer-name:*' \
                --format='json(labels)' 2>"${_sm_err}") || true

              SM_MCS=$(echo "${SM_JSON}" | python3 -c "
              import sys, json
              secrets = json.load(sys.stdin)
              for s in secrets:
                  labels = s.get('labels', {})
                  print(labels.get('maestro-consumer-name', ''))
              " 2>/dev/null) || true

              if [ -z "${SM_MCS}" ]; then
                echo "ERROR: No MC secrets found in Secret Manager"
                cat "${_sm_err}" >&2
                rm -f "${_sm_err}"
                patch_failure "NoMCSecrets" \
                  "No management cluster secrets found in Secret Manager for project ${GCP_PROJECT_ID}"
                exit 1
              fi
              rm -f "${_sm_err}"
              echo "Secret Manager MCs: $(echo ${SM_MCS} | tr '\n' ', ')"

              # Build capacity map: {mc_name: max_clusters or -1 if unlimited}
              MC_CAPS_JSON=$(echo "${SM_JSON}" | python3 -c "
              import sys, json
              secrets = json.load(sys.stdin)
              caps = {}
              for s in secrets:
                  labels = s.get('labels', {})
                  mc = labels.get('maestro-consumer-name', '')
                  max_val = labels.get('gcp-hcp_max-clusters', labels.get('max-clusters', ''))
                  caps[mc] = int(max_val) if max_val.isdigit() else -1
              print(json.dumps(caps))
              " 2>/dev/null)
              echo "MC capacity map: ${MC_CAPS_JSON}"

              # ── Step 2: Maestro consumers ──────────────────────────────
              echo "Querying Maestro consumers..."
              MAESTRO_RESPONSE=$(curl -sf "${MAESTRO_URL}/api/maestro/v1/consumers?size=100" 2>/dev/null) || true

              if [ -z "${MAESTRO_RESPONSE}" ]; then
                patch_failure "MaestroUnavailable" \
                  "Failed to query Maestro API at ${MAESTRO_URL}"
                exit 1
              fi

              MAESTRO_MCS=$(echo "${MAESTRO_RESPONSE}" | python3 -c "
              import sys, json
              data = json.load(sys.stdin)
              for c in data.get('items', []):
                  print(c['name'])
              " 2>/dev/null) || true

              if [ -z "${MAESTRO_MCS}" ]; then
                patch_failure "NoMaestroConsumers" \
                  "No consumers registered in Maestro"
                exit 1
              fi
              echo "Maestro MCs: $(echo ${MAESTRO_MCS} | tr '\n' ', ')"

              # ── Step 3: Cross-check ────────────────────────────────────
              echo "Cross-checking Secret Manager and Maestro..."
              ELIGIBLE=$(comm -12 \
                <(echo "${SM_MCS}" | sort) \
                <(echo "${MAESTRO_MCS}" | sort))

              if [ -z "${ELIGIBLE}" ]; then
                patch_failure "NoEligibleMC" \
                  "No management clusters present in both Secret Manager and Maestro"
                exit 1
              fi
              echo "Eligible MCs: $(echo ${ELIGIBLE} | tr '\n' ', ')"

              # ── Step 4: Collect placement decisions from adapter statuses ──
              # The cluster list endpoint only has aggregated Ready/Available
              # conditions — MC and DNS placement data lives on each cluster's
              # adapter statuses endpoint under the placement-adapter entry.
              echo "Querying HyperFleet API for existing placements..."
              CLUSTERS_JSON=$(curl -sf "${HYPERFLEET_API_URL}/api/hyperfleet/v1/clusters?size=1000" 2>/dev/null) || CLUSTERS_JSON=""

              PLACEMENT_DATA=$(python3 -c "
              import json, sys, urllib.request

              api = '${HYPERFLEET_API_URL}'
              clusters_json = '''${CLUSTERS_JSON}'''
              mc_placements = []
              dns_placements = []

              if clusters_json:
                  try:
                      clusters = json.loads(clusters_json)
                      for cluster in clusters.get('items', []):
                          cid = cluster.get('id', '')
                          if not cid:
                              continue
                          try:
                              url = f'{api}/api/hyperfleet/v1/clusters/{cid}/statuses'
                              resp = urllib.request.urlopen(url, timeout=5)
                              statuses = json.loads(resp.read())
                              for s in statuses.get('items', []):
                                  if s.get('adapter') != 'placement-adapter':
                                      continue
                                  data = s.get('data', {})
                                  mc = data.get('managementClusterName', '')
                                  domain = data.get('baseDomain', '')
                                  if mc:
                                      mc_placements.append(mc)
                                  if domain:
                                      dns_placements.append(domain)
                                  break
                          except Exception as e:
                              sys.stderr.write(f'Failed to fetch statuses for {cid}: {e}\n')
                  except Exception as e:
                      sys.stderr.write(f'Failed to parse cluster list: {e}\n')

              print(json.dumps({'mc': mc_placements, 'dns': dns_placements}))
              ")
              echo "Placement data collected"

              # ── Step 5: Select least-loaded MC (with capacity check) ──
              SELECTED=$(python3 -c "
              import json, sys

              eligible = '''${ELIGIBLE}'''.strip().split('\n')
              mc_caps = json.loads('${MC_CAPS_JSON}')
              placement_data = json.loads('''${PLACEMENT_DATA}''')

              mc_counts = {mc: 0 for mc in eligible}
              for mc in placement_data.get('mc', []):
                  if mc in mc_counts:
                      mc_counts[mc] += 1

              sys.stderr.write(f'MC cluster counts: {mc_counts}\n')

              available = []
              for mc in eligible:
                  cap = mc_caps.get(mc, -1)
                  if cap < 0:
                      available.append(mc)
                  elif mc_counts[mc] < cap:
                      available.append(mc)
                  else:
                      sys.stderr.write(f'MC {mc} at capacity ({mc_counts[mc]}/{cap})\n')

              if not available:
                  print('ALL_AT_CAPACITY', end='')
                  sys.exit(0)

              selected = min(available, key=lambda mc: (mc_counts[mc], mc))
              print(selected, end='')
              ")

              if [ "${SELECTED}" = "ALL_AT_CAPACITY" ]; then
                patch_failure "AllMCsAtCapacity" \
                  "All eligible management clusters are at maximum capacity"
                exit 1
              fi
              echo "Selected MC: ${SELECTED}"

              # ── Step 6: DNS zone selection (with capacity check) ─────────
              echo "Reading HC DNS domains from Secret Manager..."
              ARGOCD_SECRET_NAME=$(gcloud secrets list \
                --project="${GCP_PROJECT_ID}" \
                --filter='name:argocd-cluster AND labels.infra-type:region' \
                --format='value(name)' --limit=1 2>/dev/null) || true

              HC_DNS_DOMAINS=""
              if [ -n "${ARGOCD_SECRET_NAME}" ]; then
                HC_DNS_DOMAINS=$(gcloud secrets versions access latest \
                  --secret="${ARGOCD_SECRET_NAME}" \
                  --project="${GCP_PROJECT_ID}" 2>/dev/null \
                  | python3 -c "import sys,json; print(json.load(sys.stdin).get('meta_hc_dns_domains',''))" 2>/dev/null) || true
              fi

              if [ -z "${HC_DNS_DOMAINS}" ]; then
                MC_COND=$(build_condition "MCPlacement" "True" "MCSelected" "${SELECTED}")
                DNS_COND=$(build_condition "DNSPlacement" "False" "NoDNSDomains" \
                  "No HC DNS domains found in Secret Manager for project ${GCP_PROJECT_ID}")
                AVAIL_COND=$(build_condition "Available" "False" "PlacementFailed" "DNS zone placement failed")
                patch_job_conditions "[${MC_COND},${DNS_COND},${AVAIL_COND}]"
                exit 1
              fi

              echo "Fetching DNS zone quota and record counts..."
              DNS_QUOTA=$(gcloud dns project-info describe "${GCP_PROJECT_ID}" \
                --format='value(quota.rrsetsPerManagedZone)' 2>/dev/null) || DNS_QUOTA=""
              echo "DNS quota (rrsetsPerManagedZone): ${DNS_QUOTA:-unknown}"

              DNS_ZONES_JSON=$(gcloud dns managed-zones list \
                --project="${GCP_PROJECT_ID}" \
                --format='json(name,dnsName)' 2>/dev/null) || DNS_ZONES_JSON="[]"

              BASE_DOMAIN=$(python3 -c "
              import json, sys, subprocess

              dns_str = '${HC_DNS_DOMAINS}'
              project = '${GCP_PROJECT_ID}'
              quota = int('${DNS_QUOTA}') if '${DNS_QUOTA}'.isdigit() else 0
              domains = [d.strip() for d in dns_str.split(',') if d.strip()]
              zones_json = json.loads('''${DNS_ZONES_JSON}''')
              placement_data = json.loads('''${PLACEMENT_DATA}''')

              # Map each domain to its zone name via dnsName match
              domain_to_zone = {}
              for zone in zones_json:
                  dns_name = zone.get('dnsName', '').rstrip('.')
                  zone_name = zone.get('name', '')
                  for d in domains:
                      if d == dns_name:
                          domain_to_zone[d] = zone_name

              # Count actual records per zone for capacity check
              record_counts = {}
              for d in domains:
                  zone_name = domain_to_zone.get(d)
                  if not zone_name:
                      sys.stderr.write(f'No zone found for {d}, treating as empty\n')
                      record_counts[d] = 0
                      continue
                  try:
                      result = subprocess.run(
                          ['gcloud', 'dns', 'record-sets', 'list',
                           '--zone', zone_name, '--project', project,
                           '--format', 'value(name)'],
                          capture_output=True, text=True, timeout=30)
                      record_counts[d] = len([l for l in result.stdout.strip().split('\n') if l])
                  except Exception as e:
                      sys.stderr.write(f'Failed to count records for {zone_name}: {e}\n')
                      record_counts[d] = 0

              sys.stderr.write(f'DNS record counts: {record_counts}\n')

              # Capacity filter: exclude zones at or near quota (90% threshold)
              threshold = int(quota * 0.9) if quota > 0 else 0
              available = []
              for d in domains:
                  if quota <= 0:
                      available.append(d)
                  elif record_counts[d] < threshold:
                      available.append(d)
                  else:
                      sys.stderr.write(f'{d} at capacity ({record_counts[d]}/{quota})\n')

              if not available:
                  print('ALL_DNS_AT_CAPACITY', end='')
                  sys.exit(0)

              # Selection: least-loaded by cluster placement count
              cluster_counts = {d: 0 for d in available}
              for d in placement_data.get('dns', []):
                  if d in cluster_counts:
                      cluster_counts[d] += 1

              sys.stderr.write(f'DNS cluster counts: {cluster_counts}\n')
              selected = min(available, key=lambda d: (cluster_counts[d], d))
              print(selected, end='')
              ")

              if [ "${BASE_DOMAIN}" = "ALL_DNS_AT_CAPACITY" ]; then
                MC_COND=$(build_condition "MCPlacement" "True" "MCSelected" "${SELECTED}")
                DNS_COND=$(build_condition "DNSPlacement" "False" "AllDNSAtCapacity" \
                  "All DNS zones are at maximum record capacity")
                AVAIL_COND=$(build_condition "Available" "False" "PlacementFailed" \
                  "No DNS zone available with remaining capacity")
                patch_job_conditions "[${MC_COND},${DNS_COND},${AVAIL_COND}]"
                exit 1
              fi
              echo "Selected DNS zone: ${BASE_DOMAIN}"

              # ── Step 7: Patch Job conditions with results ───────────────
              MC_COND=$(build_condition "MCPlacement" "True" "MCSelected" "${SELECTED}")
              DNS_COND=$(build_condition "DNSPlacement" "True" "DNSZoneSelected" "${BASE_DOMAIN}")
              AVAIL_COND=$(build_condition "Available" "True" "PlacementDecided" "MC and DNS zone placement completed")
              patch_job_conditions "[${MC_COND},${DNS_COND},${AVAIL_COND}]"

              echo "=== Placement Complete ==="
              echo "  MC:       ${SELECTED}"
              echo "  DNS Zone: ${BASE_DOMAIN}"
          env:
            - name: CLUSTER_ID
              value: "{{ .clusterId }}"
            - name: NAMESPACE
              value: "{{ .namespace }}"
            - name: GCP_PROJECT_ID
              value: "{{ .gcpProjectId }}"
            - name: MAESTRO_URL
              value: "{{ .maestroUrl }}"
            - name: HYPERFLEET_API_URL
              value: "{{ .hyperfleetApiUrl }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
