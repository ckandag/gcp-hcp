apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterConfig
metadata:
  name: adapter-placement-job
  labels:
    hyperfleet.io/adapter-type: kubernetes
    hyperfleet.io/component: adapter
spec:
  adapter:
    version: "0.1.0"

  debugConfig: true
  log:
    level: debug

  clients:
    hyperfleetApi:
      baseUrl: http://hyperfleet-api:8000
      version: v1
      timeout: 10s
      retryAttempts: 3
      retryBackoff: exponential

    kubernetes:
      apiVersion: "v1"
